# Window Rules
# See https://wiki.hypr.land/Configuring/Window-Rules/

# Float common dialogs
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save File)$
windowrulev2 = float, title:^(File Upload)$
windowrulev2 = float, title:^(Choose Files)$

# Picture-in-Picture
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 480 270, title:^(Picture-in-Picture)$
windowrulev2 = move 100%-490 100%-280, title:^(Picture-in-Picture)$

# Opacity rules
windowrulev2 = opacity 0.90 0.90, class:^(alacritty)$
windowrulev2 = opacity 0.90 0.90, class:^(foot)$
windowrulev2 = opacity 0.90 0.90, class:^(kitty)$
windowrulev2 = opacity 0.85 0.85, class:^(org.gnome.Nautilus)$

# Idle inhibit for fullscreen video
windowrulev2 = idleinhibit fullscreen, class:^(firefox)$
windowrulev2 = idleinhibit fullscreen, class:^(mpv)$
windowrulev2 = idleinhibit fullscreen, class:^(vlc)$

# Layer rules
layerrule = blur, waybar
layerrule = blur, rofi
layerrule = blur, notifications
